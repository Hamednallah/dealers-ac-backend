services:

  # ─────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dealersac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dealersac}
      POSTGRES_USER: ${DB_USER:-dealersac}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dealersac_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dealersac}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealersac-net

  # ─────────────────────────────────────────────
  # Application
  # ─────────────────────────────────────────────
  app:
    build: .
    container_name: dealersac-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-dealersac}
      DB_USER: ${DB_USER:-dealersac}
      DB_PASSWORD: ${DB_PASSWORD:-dealersac_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM: ${MAILGUN_FROM:-noreply@dealersac.com}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234!}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    networks:
      - dealersac-net

  mongodb:
    image: mongo:latest
    container_name: dealers-ac-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=audit_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - dealersac-net

volumes:
  postgres_data:
  mongodb_data:

networks:
  dealersac-net:
    driver: bridge
