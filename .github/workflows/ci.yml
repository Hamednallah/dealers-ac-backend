name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Testcontainers needs Docker to be available, Linux runners have Docker out of the box
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Ensure Docker is ready
      run: docker info
      
    - name: Build with Maven (Unit + Integration Tests)
      run: mvn -B verify --file pom.xml
      
  docker-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      run: docker build -t dealers-ac-backend:${{ github.sha }} -t dealers-ac-backend:latest .
