spring:
  application:
    name: dealers-ac-backend

  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://localhost:27017/audit_db}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dealersac}
    username: ${DB_USER:dealersac}
    password: ${DB_PASSWORD:dealersac_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    deserialization:
      fail-on-unknown-properties: true
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 1MB

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-prod-must-be-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}

  admin:
    password: ${ADMIN_PASSWORD:Admin@1234!}

  mailgun:
    api-key: ${MAILGUN_API_KEY:}
    domain: ${MAILGUN_DOMAIN:}
    from: ${MAILGUN_FROM:noreply@dealersac.com}
    enabled: ${MAILGUN_ENABLED:false}

  webhook:
    url: ${WEBHOOK_URL:}
    enabled: ${WEBHOOK_ENABLED:false}

  rate-limit:
    auth-requests-per-minute: 5
    register-requests-per-minute: 10
    api-requests-per-minute: 100

logging:
  level:
    com.dealersac: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
